name: Daily Savant Pipeline

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch: 

jobs:
  extract_and_load:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests pyarrow huggingface_hub

      - name: Run Mozilla-Bypass Scraper
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python scraper.py
