name: Atlas Daily Ingestion & Processing

on:
  schedule:
    # Runs at 4:00 AM EST every day
    - cron: '0 8 * * *' 
  workflow_dispatch: # Allows you to manually click "Run" in GitHub

jobs:
  run-daily-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Enterprise Stack
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy xgboost duckdb huggingface_hub scikit-learn pyarrow pybaseball

      - name: Step 1 - Scrape Yesterday's Data
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/scrape_daily.py

      - name: Step 2 - Run Delta Physics & Engine Update
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/precompute_daily.py
